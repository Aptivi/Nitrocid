name: Push to PPA (amend with original source)

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      orig-name: ${{ steps.dl.outputs.orig-name }}
    steps:
      - name: Download original source
        id: dl
        env:
          ORIG_VERSION: "3.0.25.593-0.1.0.83-1"
        run: |
          UPSTREAM_VERSION=$(echo "$ORIG_VERSION" | sed -E 's/-[^-]+$//')
          ORIG_NAME="nitrocid-25_${UPSTREAM_VERSION}.orig.tar.xz"
          wget --output-document="../${ORIG_NAME}" \
            "https://launchpad.net/~eofla/+archive/ubuntu/nitrocid/+sourcefiles/nitrocid-25/${ORIG_VERSION}/${ORIG_NAME}"
          echo "orig-name=${ORIG_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: orig-source
          path: ../${{ steps.dl.outputs.orig-name }}
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            series: "24.04"
          - distro: resolute
            series: "26.04"
          - distro: stonking
            series: "26.10"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          name: orig-source
          path: ..

      - name: Changelog targeting ${{ matrix.distro }}
        env:
          DEBEMAIL: "ceo@aptivi.anonaddy.com"
          DEBFULLNAME: "Aptivi CEO"
        run: |
          BASE_VERSION=$(dpkg-parsechangelog -S Version)
          NEW_VERSION="${BASE_VERSION}~${{ matrix.series }}.1"
          dch --newversion "$NEW_VERSION" \
              --distribution "${{ matrix.distro }}" \
              --force-distribution -b \
              "Rebuild for Ubuntu ${{ matrix.series }} (${{ matrix.distro }})"

      - name: Extract original source
        run: |
          tar xf "../$(basename ../nitrocid-25_*.orig.tar.xz)" .
          mv .github ..

      - name: Build source package
        run: debuild -S

      - name: Push to Launchpad
        run: dput apt-ppa ../nitrocid-25_*_source.changes
