name: Prepare release (canary)

on:
  push:
    branches: [ "main", "v0.1.0.x-saas", "v0.2.0.x-saas", "v0.2.1.x-saas" ]
  pull_request:
    branches: [ "main", "v0.1.0.x-saas", "v0.2.0.x-saas", "v0.2.1.x-saas" ]
    
jobs:
  build:

    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          ref: ${{ github.ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # - name: Add GitHub Package Registry to get access to beta builds
      #   run: dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
      - name: Release Asset Preparation
        run: |
          pip install aptivi-adt
          adt build -b "-p:Configuration=Debug -p:ContinuousIntegrationBuild=true"
          adt buildwix Debug x64
          adt buildwix Debug ARM64
          adt packbin
          adt packwix Debug x64
          adt packwix Debug ARM64
      - uses: actions/upload-artifact@v7
        with:
          name: installer-x64-msi
          path: "artifacts/nitrocid-win-x64-installer.exe"
          archive: false
      - uses: actions/upload-artifact@v7
        with:
          name: installer-arm64-msi
          path: "artifacts/nitrocid-win-arm64-installer.exe"
          archive: false
      - uses: actions/upload-artifact@v7
        with:
          name: nks-build
          path: "public/Nitrocid/KSBuild"
      - uses: actions/upload-artifact@v7
        with:
          name: nks-analyzer
          path: "public/Nitrocid/KSAnalyzer"
      - name: Package Publication
        run: |
          dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
          adt pushbin -a "${{ secrets.GITHUB_TOKEN }}" -s "github"
