name: Build Project (Release)

on:
  push:
    branches: [ "main", "v0.1.0.x-saas", "v0.2.0.x-saas", "v0.2.1.x-saas" ]
  pull_request:
    branches: [ "main", "v0.1.0.x-saas", "v0.2.0.x-saas", "v0.2.1.x-saas" ]
    
jobs:
  build:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          ref: ${{ github.ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # - name: Add GitHub Package Registry to get access to beta builds
      #   run: dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
      - name: Solution Compilation
        run: python tools/adt.py build -b "-p:Configuration=Release -p:ContinuousIntegrationBuild=true"
      - name: Testing
        run: python tools/adt.py test -t="--no-build --configuration Release"
      - uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: unit-test-log-${{ matrix.runs-on }}
          path: "private/Nitrocid.Tests/KSTest/net10.0/UnitTestDebug.log"
      - uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: unit-test-log-ms-${{ matrix.runs-on }}
          path: "private/Nitrocid.Tests/KSTest/net10.0/TestResults"
