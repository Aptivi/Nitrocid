name: Prepare release

on:
  push:
    tags:
      - 'v0.2.*'
    
jobs:
  build:

    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          ref: ${{ github.ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # - name: Add GitHub Package Registry to get access to beta builds
      #   run: dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
      - name: Setup DocFX
        run: dotnet tool install --global docfx
      - name: Release Asset Preparation
        run: |
          python tools/adt.py build -b "-p:Configuration=Release -p:ContinuousIntegrationBuild=true"
          python tools/adt.py packbin
          python tools/adt.py gendocs
          python tools/adt.py packdocs
          dotnet build -p:Configuration=Release -p:Platform=x64 public/Nitrocid.Installers/Nitrocid.Installer.slnx
          dotnet build -p:Configuration=Release -p:Platform=ARM64 public/Nitrocid.Installers/Nitrocid.Installer.slnx
          Move-Item public/Nitrocid.Installers/Nitrocid.InstallerBundle/bin/x64/Release/Nitrocid.InstallerBundle.exe artifacts/nitrocid-win-x64-installer.exe
          Move-Item public/Nitrocid.Installers/Nitrocid.InstallerBundle/bin/ARM64/Release/Nitrocid.InstallerBundle.exe artifacts/nitrocid-win-arm64-installer.exe
      - name: Release Preparation
        id: release-asset
        shell: bash
        run: |
          echo "SUBJECT=$(cat CHANGES.TITLE)" >> "$GITHUB_OUTPUT"
          echo 'BODY<<EOF' >> "$GITHUB_OUTPUT"
          cat CHANGES >> "$GITHUB_OUTPUT"
          powershell 'Get-FileHash -Algorithm sha256 artifacts/*.zip | % {"- " + $_.Hash + "  " + (Resolve-Path -Path $_.Path -Relative)}' >> "$GITHUB_OUTPUT"
          powershell 'Get-FileHash -Algorithm sha256 artifacts/*-changes.chg | % {"- " + $_.Hash + "  " + (Resolve-Path -Path $_.Path -Relative)}' >> "$GITHUB_OUTPUT"
          powershell 'Get-FileHash -Algorithm sha256 artifacts/*.exe | % {"- " + $_.Hash + "  " + (Resolve-Path -Path $_.Path -Relative)}' >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Binary Attestation (binaries)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/*.zip'
      - name: Release Making
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-asset.outputs.BODY }}
          name: ${{ steps.release-asset.outputs.SUBJECT }}
          files: |
            artifacts/*.zip
            artifacts/*-changes.chg
            artifacts/*.exe
      - name: Package Publication
        run: python tools/adt.py pushbin -a "${{ secrets.NUGET_APIKEY }}"
